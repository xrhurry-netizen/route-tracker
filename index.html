<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>路线记录仪</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+SC:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #161923;
    --surface2: #1e2333;
    --border: #2a3045;
    --accent: #00e5a0;
    --accent2: #00b8ff;
    --danger: #ff4757;
    --warning: #ffa502;
    --text: #e8ecf5;
    --muted: #6b7594;
    --mono: 'Space Mono', monospace;
    --sans: 'Noto Sans SC', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: var(--sans); }
  #app { display: flex; flex-direction: column; height: 100vh; }
  #header { flex-shrink: 0; display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; background: var(--surface); border-bottom: 1px solid var(--border); z-index: 1000; }
  #header h1 { font-family: var(--mono); font-size: 15px; letter-spacing: 2px; color: var(--accent); text-transform: uppercase; }
  #status-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--muted); transition: background 0.3s; }
  #status-dot.tracking { background: var(--accent); animation: pulse 1.2s infinite; }
  #status-dot.paused   { background: var(--warning); }
  @keyframes pulse { 0%,100%{ box-shadow: 0 0 0 0 rgba(0,229,160,0.6); } 50% { box-shadow: 0 0 0 6px rgba(0,229,160,0); } }
  #map { flex: 1; min-height: 0; z-index: 1; }
  #stats-bar { flex-shrink: 0; display: flex; justify-content: space-around; background: var(--surface); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); padding: 10px 0; }
  .stat { display: flex; flex-direction: column; align-items: center; flex: 1; }
  .stat + .stat { border-left: 1px solid var(--border); }
  .stat-label { font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 2px; }
  .stat-value { font-family: var(--mono); font-size: 20px; color: var(--text); font-weight: 700; }
  .stat-unit { font-size: 9px; color: var(--muted); margin-top: 1px; }
  #controls { flex-shrink: 0; display: flex; gap: 10px; padding: 12px 16px; background: var(--surface); }
  .btn { flex: 1; padding: 12px 8px; border: none; border-radius: 8px; font-family: var(--mono); font-size: 12px; letter-spacing: 1px; font-weight: 700; cursor: pointer; text-transform: uppercase; transition: all 0.15s; outline: none; }
  .btn:active { transform: scale(0.96); }
  .btn-primary { background: var(--accent); color: #000; }
  .btn-danger { background: transparent; border: 1px solid var(--danger); color: var(--danger); }
  .btn-secondary { background: transparent; border: 1px solid var(--border); color: var(--muted); }
  .btn-save { background: var(--accent2); color: #000; }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
  #history-panel { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--bg); z-index: 2000; overflow-y: auto; flex-direction: column; }
  #history-panel.open { display: flex; }
  #history-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; }
  #history-header h2 { font-family: var(--mono); font-size: 14px; color: var(--accent); letter-spacing: 2px; }
  #close-history { background: none; border: none; color: var(--muted); font-size: 22px; cursor: pointer; font-family: var(--mono); }
  #history-list { flex: 1; padding: 12px; display: flex; flex-direction: column; gap: 10px; }
  .history-item { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px; cursor: pointer; transition: border-color 0.2s; }
  .history-item:hover { border-color: var(--accent); }
  .history-item-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .history-item-name { font-family: var(--mono); font-size: 13px; color: var(--accent); }
  .history-item-date { font-size: 11px; color: var(--muted); }
  .history-item-stats { display: flex; gap: 18px; flex-wrap: wrap; }
  .history-stat { font-size: 12px; color: var(--text); }
  .history-stat span { color: var(--muted); font-size: 11px; }
  .history-item-del { background: none; border: 1px solid transparent; color: var(--danger); font-size: 13px; cursor: pointer; font-family: var(--mono); padding: 2px 6px; border-radius: 4px; }
  .history-item-del:hover { border-color: var(--danger); }
  #no-history { color: var(--muted); text-align: center; padding: 40px; font-size: 14px; }
  #toast { position: fixed; bottom: 120px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 10px 20px; border-radius: 20px; font-size: 13px; opacity: 0; pointer-events: none; transition: all 0.3s; z-index: 3000; white-space: nowrap; }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .leaflet-tile-pane { filter: brightness(0.75) saturate(0.7) hue-rotate(10deg); }
  .leaflet-control-attribution { display: none !important; }
  .leaflet-control-zoom a { background: var(--surface) !important; color: var(--text) !important; border-color: var(--border) !important; }
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <h1>路线记录仪</h1>
    <div style="display:flex;align-items:center;gap:10px;">
      <span id="mode-label" style="font-size:11px;color:var(--muted);font-family:var(--mono);">就绪</span>
      <div id="status-dot"></div>
      <button class="btn btn-secondary" style="flex:none;padding:6px 12px;font-size:11px;" onclick="openHistory()">历史</button>
    </div>
  </div>
  <div id="map"></div>
  <div id="stats-bar">
    <div class="stat"><div class="stat-label">距离</div><div class="stat-value" id="stat-dist">0.00</div><div class="stat-unit">KM</div></div>
    <div class="stat"><div class="stat-label">时间</div><div class="stat-value" id="stat-time">00:00</div><div class="stat-unit">MM:SS</div></div>
    <div class="stat"><div class="stat-label">速度</div><div class="stat-value" id="stat-speed">0.0</div><div class="stat-unit">KM/H</div></div>
    <div class="stat"><div class="stat-label">点位</div><div class="stat-value" id="stat-pts">0</div><div class="stat-unit">PTS</div></div>
  </div>
  <div id="controls">
    <button class="btn btn-primary"   id="btn-start" onclick="startTracking()">开始</button>
    <button class="btn btn-danger"    id="btn-stop"  onclick="stopTracking()"  disabled>停止</button>
    <button class="btn btn-save"      id="btn-save"  onclick="saveRoute()"     disabled>保存</button>
    <button class="btn btn-secondary" id="btn-reset" onclick="resetRoute()"    disabled>清除</button>
  </div>
</div>
<div id="history-panel">
  <div id="history-header">
    <h2>历史路线</h2>
    <button id="close-history" onclick="closeHistory()">✕</button>
  </div>
  <div id="history-list"></div>
</div>
<div id="toast"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
const map = L.map('map', { zoomControl: true, attributionControl: false });
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
map.setView([49.8951, -97.1384], 13);

let tracking = false, watchId = null, points = [], polyline = null;
let startMarker = null, endMarker = null, currentMarker = null;
let startTime = null, timerInterval = null, totalDistance = 0, lastSpeedSamples = [];

function haversine(a, b) {
  const R=6371, dLat=(b.lat-a.lat)*Math.PI/180, dLon=(b.lng-a.lng)*Math.PI/180,
        la=a.lat*Math.PI/180, lb=b.lat*Math.PI/180,
        x=Math.sin(dLat/2)**2+Math.cos(la)*Math.cos(lb)*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}
function formatTime(ms) {
  const s=Math.floor(ms/1000),m=Math.floor(s/60),h=Math.floor(m/60);
  if(h>0) return `${h}:${String(m%60).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
  return `${String(m).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
}
function formatTimeFull(ms) {
  const s=Math.floor(ms/1000),m=Math.floor(s/60),h=Math.floor(m/60),parts=[];
  if(h) parts.push(`${h}小时`); if(m%60) parts.push(`${m%60}分`); parts.push(`${s%60}秒`);
  return parts.join('');
}
function showToast(msg, d=2500) {
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),d);
}
function updateButtons(state) {
  document.getElementById('btn-start').disabled = state!=='idle';
  document.getElementById('btn-stop').disabled  = state!=='tracking';
  document.getElementById('btn-save').disabled  = state!=='stopped'||points.length<2;
  document.getElementById('btn-reset').disabled = state==='idle';
}
function setMode(label) { document.getElementById('mode-label').textContent=label; }
function makeIcon(color,size=14) {
  return L.divIcon({html:`<div style="width:${size}px;height:${size}px;border-radius:50%;background:${color};border:2px solid #fff;box-shadow:0 0 6px ${color}aa;"></div>`,iconSize:[size,size],iconAnchor:[size/2,size/2],className:''});
}
function makeArrow() {
  return L.divIcon({html:`<div style="width:16px;height:16px;border-radius:50%;background:#00e5a0;border:2px solid #fff;box-shadow:0 0 10px #00e5a066;animation:apulse 1.5s infinite;"></div><style>@keyframes apulse{0%,100%{box-shadow:0 0 0 0 #00e5a066}50%{box-shadow:0 0 0 8px transparent}}</style>`,iconSize:[16,16],iconAnchor:[8,8],className:''});
}

function startTracking() {
  if (!navigator.geolocation) { showToast('⚠️ 浏览器不支持定位'); return; }
  tracking=true; points=[]; totalDistance=0; lastSpeedSamples=[]; updateStats();
  if(polyline){map.removeLayer(polyline);polyline=null;}
  if(startMarker){map.removeLayer(startMarker);startMarker=null;}
  if(endMarker){map.removeLayer(endMarker);endMarker=null;}
  if(currentMarker){map.removeLayer(currentMarker);currentMarker=null;}
  polyline=L.polyline([],{color:'#00e5a0',weight:4,opacity:0.9,lineJoin:'round',lineCap:'round'}).addTo(map);
  startTime=Date.now(); timerInterval=setInterval(updateTimer,500);
  document.getElementById('status-dot').className='tracking';
  setMode('记录中'); updateButtons('tracking'); showToast('📍 开始记录路线...');
  watchId=navigator.geolocation.watchPosition(onPosition,onError,{enableHighAccuracy:true,timeout:15000,maximumAge:0});
}
function onPosition(pos) {
  const {latitude:lat,longitude:lng,accuracy}=pos.coords, now=Date.now(), pt={lat,lng,time:now};
  if(points.length===0) {
    map.setView([lat,lng],17);
    startMarker=L.marker([lat,lng],{icon:makeIcon('#00b8ff',12),zIndexOffset:10}).addTo(map).bindPopup('起点').openPopup();
  } else {
    const prev=points[points.length-1], d=haversine(prev,pt);
    if(d<0.003) return;
    totalDistance+=d;
    const dt=(now-prev.time)/3600000, spd=dt>0?d/dt:0;
    lastSpeedSamples.push(spd); if(lastSpeedSamples.length>5) lastSpeedSamples.shift();
  }
  points.push(pt); polyline.addLatLng([lat,lng]);
  if(currentMarker) map.removeLayer(currentMarker);
  currentMarker=L.marker([lat,lng],{icon:makeArrow(),zIndexOffset:20}).addTo(map);
  if(!map.getBounds().contains([lat,lng])) map.panTo([lat,lng]);
  updateStats();
}
function onError(err) {
  const msgs={1:'定位权限被拒绝，请在设置中允许',2:'无法获取位置信号',3:'定位超时，请重试'};
  showToast('⚠️ '+(msgs[err.code]||'定位错误'),4000);
}
function stopTracking() {
  if(watchId!==null){navigator.geolocation.clearWatch(watchId);watchId=null;}
  clearInterval(timerInterval); tracking=false;
  document.getElementById('status-dot').className='paused';
  setMode('已停止'); updateButtons('stopped');
  if(points.length>=2) {
    const last=points[points.length-1];
    if(endMarker) map.removeLayer(endMarker);
    endMarker=L.marker([last.lat,last.lng],{icon:makeIcon('#ff4757',12)}).addTo(map).bindPopup('终点').openPopup();
    if(polyline) map.fitBounds(polyline.getBounds(),{padding:[40,40]});
    showToast(`✅ 路线完成：${totalDistance.toFixed(2)} km`);
  } else { showToast('⚠️ 数据点太少'); }
}
function resetRoute() {
  if(watchId!==null){navigator.geolocation.clearWatch(watchId);watchId=null;}
  clearInterval(timerInterval); tracking=false; points=[]; totalDistance=0;
  [polyline,startMarker,endMarker,currentMarker].forEach(l=>{if(l)map.removeLayer(l);});
  polyline=startMarker=endMarker=currentMarker=null;
  document.getElementById('status-dot').className=''; setMode('就绪'); updateButtons('idle'); updateStats();
}
function updateStats() {
  document.getElementById('stat-dist').textContent=totalDistance.toFixed(2);
  document.getElementById('stat-pts').textContent=points.length;
  const avg=lastSpeedSamples.length?lastSpeedSamples.reduce((a,b)=>a+b,0)/lastSpeedSamples.length:0;
  document.getElementById('stat-speed').textContent=avg.toFixed(1);
}
function updateTimer() {
  if(!startTime) return;
  document.getElementById('stat-time').textContent=formatTime(Date.now()-startTime);
}

async function saveRoute() {
  if(points.length<2){showToast('路线点不足');return;}
  const elapsed=points[points.length-1].time-points[0].time;
  const record={id:Date.now().toString(),date:new Date().toLocaleString('zh-CN'),distance:totalDistance,duration:elapsed,points:points.slice()};
  const arr=await loadAllRoutes(); arr.unshift(record);
  localStorage.setItem('routes',JSON.stringify(arr));
  showToast('✅ 路线已保存！'); document.getElementById('btn-save').disabled=true;
}
async function loadAllRoutes() {
  try{return JSON.parse(localStorage.getItem('routes')||'[]');}catch{return[];}
}

let historyPolyline=null, historyMarkers=[];
function clearHistoryLayers() {
  if(historyPolyline){map.removeLayer(historyPolyline);historyPolyline=null;}
  historyMarkers.forEach(m=>map.removeLayer(m)); historyMarkers=[];
}
async function openHistory() {
  document.getElementById('history-panel').classList.add('open');
  const list=document.getElementById('history-list');
  list.innerHTML='<div style="color:var(--muted);text-align:center;padding:24px;">加载中…</div>';
  const routes=await loadAllRoutes();
  if(!routes.length){list.innerHTML='<div id="no-history">暂无保存的路线<br><span style="font-size:12px;">记录并保存后会在此显示</span></div>';return;}
  list.innerHTML='';
  routes.forEach((r,i)=>{
    const div=document.createElement('div'); div.className='history-item';
    div.innerHTML=`<div class="history-item-header"><span class="history-item-name">路线 ${routes.length-i}</span><div style="display:flex;align-items:center;gap:8px;"><span class="history-item-date">${r.date}</span><button class="history-item-del" onclick="deleteRoute('${r.id}',event)">删除</button></div></div><div class="history-item-stats"><div class="history-stat">📏 ${r.distance.toFixed(2)} <span>km</span></div><div class="history-stat">⏱ ${formatTimeFull(r.duration)}</div><div class="history-stat">🔵 ${r.points.length} <span>点</span></div><div class="history-stat">⚡ ${(r.distance/(r.duration/3600000)).toFixed(1)} <span>km/h</span></div></div>`;
    div.querySelector('.history-item-header').addEventListener('click',e=>{if(e.target.classList.contains('history-item-del'))return;viewRoute(r);});
    list.appendChild(div);
  });
}
function closeHistory(){document.getElementById('history-panel').classList.remove('open');}
function viewRoute(r) {
  closeHistory(); clearHistoryLayers();
  if(r.points.length<2) return;
  const lls=r.points.map(p=>[p.lat,p.lng]);
  historyPolyline=L.polyline(lls,{color:'#00b8ff',weight:4,opacity:0.9}).addTo(map);
  historyMarkers=[L.marker(lls[0],{icon:makeIcon('#00b8ff',12)}).addTo(map).bindPopup('起点').openPopup(),L.marker(lls[lls.length-1],{icon:makeIcon('#ff4757',12)}).addTo(map).bindPopup('终点')];
  map.fitBounds(historyPolyline.getBounds(),{padding:[50,50]});
  showToast(`📍 ${r.distance.toFixed(2)} km · ${formatTimeFull(r.duration)}`);
}
async function deleteRoute(id,e) {
  e.stopPropagation();
  if(!confirm('确定删除这条路线？')) return;
  const arr=await loadAllRoutes();
  localStorage.setItem('routes',JSON.stringify(arr.filter(r=>r.id!==id)));
  openHistory();
}

updateButtons('idle');
navigator.geolocation?.getCurrentPosition(pos=>{map.setView([pos.coords.latitude,pos.coords.longitude],16);},()=>{});
</script>
</body>
</html>
