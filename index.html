<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="referrer" content="origin">
<title>路线记录仪</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.css"/>

<style>
:root {
  --bg:#0d0f14; --surface:#161923; --surface2:#1e2333; --border:#2a3045;
  --accent:#00e5a0; --accent2:#00b8ff; --danger:#ff4757; --warning:#ffa502;
  --text:#e8ecf5; --muted:#6b7594;
  --mono:ui-monospace,'SF Mono','Menlo','Consolas',monospace; --sans:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--sans);}
#app{display:flex;flex-direction:column;height:100vh;}
#header{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:var(--surface);border-bottom:1px solid var(--border);z-index:1000;}
#header h1{font-family:var(--mono);font-size:15px;letter-spacing:2px;color:var(--accent);text-transform:uppercase;}
#status-dot{width:10px;height:10px;border-radius:50%;background:var(--muted);transition:background .3s;flex-shrink:0;}
#status-dot.on{background:var(--accent);animation:blink 1.2s infinite;}
#status-dot.off{background:var(--warning);}
@keyframes blink{0%,100%{box-shadow:0 0 0 0 rgba(0,229,160,.6);}50%{box-shadow:0 0 0 6px transparent;}}
#wake-banner{display:none;flex-shrink:0;background:#1a1200;border-bottom:1px solid var(--warning);color:var(--warning);font-size:11px;padding:5px 14px;text-align:center;font-family:var(--mono);}
#gps-bar{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:4px 14px;background:var(--surface2);border-bottom:1px solid var(--border);font-size:10px;color:var(--muted);font-family:var(--mono);}
#gps-bar b{color:var(--text);}
#map{flex:1;min-height:0;z-index:1;}
#stats-bar{flex-shrink:0;display:flex;justify-content:space-around;background:var(--surface);border-top:1px solid var(--border);border-bottom:1px solid var(--border);padding:10px 0;}
.stat{display:flex;flex-direction:column;align-items:center;flex:1;}
.stat+.stat{border-left:1px solid var(--border);}
.stat-label{font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:2px;}
.stat-value{font-family:var(--mono);font-size:20px;color:var(--text);font-weight:700;}
.stat-unit{font-size:9px;color:var(--muted);margin-top:1px;}
#controls{flex-shrink:0;display:flex;gap:10px;padding:12px 16px;background:var(--surface);}
.btn{flex:1;padding:12px 6px;border:none;border-radius:8px;font-family:var(--mono);font-size:11px;letter-spacing:1px;font-weight:700;cursor:pointer;text-transform:uppercase;transition:transform .1s,filter .1s,background .1s;outline:none;-webkit-tap-highlight-color:transparent;}
.btn:active{transform:scale(.88);filter:brightness(1.5);}
.btn.flash{transform:scale(.88);filter:brightness(1.5);}
.btn-start{background:var(--accent);color:#000;}
.btn-stop{background:transparent;border:2px solid var(--danger);color:var(--danger);}
.btn-save{background:var(--accent2);color:#000;}
.btn-reset{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn:disabled{opacity:.28;pointer-events:none;}
#history-panel{display:none;position:fixed;inset:0;background:var(--bg);z-index:2000;overflow-y:auto;flex-direction:column;}
#history-panel.open{display:flex;}
#hist-head{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;}
#hist-head h2{font-family:var(--mono);font-size:14px;color:var(--accent);letter-spacing:2px;}
#hist-close{background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;}
#hist-list{flex:1;padding:12px;display:flex;flex-direction:column;gap:10px;}
.hitem{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;cursor:pointer;transition:border-color .2s;}
.hitem:active{border-color:var(--accent);}
.hitem-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.hitem-name{font-family:var(--mono);font-size:13px;color:var(--accent);}
.hitem-date{font-size:11px;color:var(--muted);}
.hitem-stats{display:flex;gap:12px;flex-wrap:wrap;}
.hs{font-size:12px;color:var(--text);}
.hs span{color:var(--muted);font-size:11px;}
.hdel{background:none;border:1px solid transparent;color:var(--danger);font-size:13px;cursor:pointer;padding:2px 6px;border-radius:4px;}
.hdel:active{border-color:var(--danger);}
#toast{position:fixed;bottom:130px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:10px 20px;border-radius:20px;font-size:13px;opacity:0;pointer-events:none;transition:all .3s;z-index:3000;white-space:nowrap;max-width:92vw;text-align:center;word-break:keep-all;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.leaflet-tile-pane{}
.leaflet-control-attribution{display:none!important;}
.leaflet-control-zoom a{background:var(--surface)!important;color:var(--text)!important;border-color:var(--border)!important;}
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <h1>路线记录仪</h1>
    <div style="display:flex;align-items:center;gap:10px;">
      <span id="mode-lbl" style="font-size:11px;color:var(--muted);font-family:var(--mono);">就绪</span>
      <div id="status-dot"></div>
      <button class="btn btn-reset" style="flex:none;padding:6px 12px;font-size:11px;" onclick="openHistory()">历史</button>
    </div>
  </div>
  <div id="wake-banner">⚠️ 屏幕常亮锁定失败，请勿锁屏，否则 GPS 将暂停</div>
  <div id="gps-bar">
    <span>精度 <b id="g-acc">—</b> m</span>
    <span>更新 <b id="g-time">—</b></span>
    <span>频率 <b id="g-hz">—</b> Hz</span>
  </div>
  <div id="map"></div>
  <div id="stats-bar">
    <div class="stat"><div class="stat-label">距离</div><div class="stat-value" id="s-dist">0.00</div><div class="stat-unit">KM</div></div>
    <div class="stat"><div class="stat-label">时间</div><div class="stat-value" id="s-time">00:00</div><div class="stat-unit"></div></div>
    <div class="stat"><div class="stat-label">速度</div><div class="stat-value" id="s-spd">0.0</div><div class="stat-unit">KM/H</div></div>
    <div class="stat"><div class="stat-label">点位</div><div class="stat-value" id="s-pts">0</div><div class="stat-unit">PTS</div></div>
  </div>
  <div id="controls">
    <button class="btn btn-start" id="btn-start" onclick="cmdStart()">开始</button>
    <button class="btn btn-stop"  id="btn-stop"  onclick="cmdStop()"  disabled>停止</button>
    <button class="btn btn-save"  id="btn-save"  onclick="cmdSave()"  disabled>保存</button>
    <button class="btn btn-reset" id="btn-reset" onclick="cmdReset()" disabled>清除</button>
  </div>
</div>
<div id="history-panel">
  <div id="hist-head">
    <h2>历史路线</h2>
    <button id="hist-close" onclick="closeHistory()">✕</button>
  </div>
  <div id="hist-list"></div>
</div>
<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.js"></script>
<script>
/* ===== MAP ===== */
var map = L.map('map', {zoomControl:true, attributionControl:false});
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:20}).addTo(map);
map.setView([49.8951, -97.1384], 13);

/* ===== STATE ===== */
var tracking=false, watchId=null, backupTimer=null, wakeLock=null, silentSrc=null, audioCtx=null;
var points=[], polyline=null, mStart=null, mEnd=null, mCur=null;
var startTime=null, timerIv=null, totalDist=0, lastPtTime=0, hzBuf=[], hiddenAt=null;

/* ===== UTILS ===== */
function hav(a,b){
  var R=6371,dLa=(b.lat-a.lat)*Math.PI/180,dLo=(b.lng-a.lng)*Math.PI/180,
      la=a.lat*Math.PI/180,lb=b.lat*Math.PI/180,
      x=Math.sin(dLa/2)*Math.sin(dLa/2)+Math.cos(la)*Math.cos(lb)*Math.sin(dLo/2)*Math.sin(dLo/2);
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}
function pad(n){return String(n).padStart(2,'0');}
function fmtT(ms){var s=Math.floor(ms/1000),m=Math.floor(s/60),h=Math.floor(m/60);return h>0?h+':'+pad(m%60)+':'+pad(s%60):pad(m)+':'+pad(s%60);}
function fmtTL(ms){var s=Math.floor(ms/1000),m=Math.floor(s/60),h=Math.floor(m/60),p=[];if(h)p.push(h+'小时');if(m%60)p.push((m%60)+'分');p.push((s%60)+'秒');return p.join('');}
function toast(msg,d){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove('show');},d||2800);}
function setMode(s){document.getElementById('mode-lbl').textContent=s;}
function setBtns(st){
  document.getElementById('btn-start').disabled=(st!=='idle');
  document.getElementById('btn-stop').disabled=(st!=='run');
  document.getElementById('btn-save').disabled=(st!=='done'||points.length<2);
  document.getElementById('btn-reset').disabled=(st==='idle');
}

/* ===== BUTTON FLASH ===== */
function flash(id,lbl){
  var b=document.getElementById(id);
  b.classList.add('flash');
  var orig=b.textContent;
  if(lbl)b.textContent=lbl;
  setTimeout(function(){b.classList.remove('flash');if(lbl)b.textContent=orig;},400);
}

/* ===== AUDIO ===== */
function getAC(){
  if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended')audioCtx.resume();
  return audioCtx;
}
function tone(freqs,dur,type,vol){
  try{
    var c=getAC();
    freqs.forEach(function(f,i){
      var o=c.createOscillator(),g=c.createGain();
      o.connect(g);g.connect(c.destination);
      o.type=type||'triangle';
      var t=c.currentTime+i*dur*0.55;
      o.frequency.setValueAtTime(f,t);
      g.gain.setValueAtTime(vol||0.18,t);
      g.gain.exponentialRampToValueAtTime(0.001,t+dur);
      o.start(t);o.stop(t+dur+0.05);
    });
  }catch(e){}
}
function startSilent(){
  try{
    var c=getAC(),buf=c.createBuffer(1,c.sampleRate*3,c.sampleRate),d=buf.getChannelData(0);
    for(var i=0;i<d.length;i++)d[i]=Math.sin(2*Math.PI*18*i/c.sampleRate)*0.002;
    function lp(){silentSrc=c.createBufferSource();silentSrc.buffer=buf;silentSrc.connect(c.destination);silentSrc.onended=function(){if(tracking)lp();};silentSrc.start();}
    lp();
  }catch(e){}
}
function stopSilent(){try{if(silentSrc)silentSrc.stop();}catch(e){}silentSrc=null;}
document.addEventListener('touchstart',function(){try{getAC();}catch(e){}},{once:true});

/* ===== WAKE LOCK ===== */
function reqWake(){
  if(!navigator.wakeLock){document.getElementById('wake-banner').style.display='block';return;}
  navigator.wakeLock.request('screen').then(function(wl){
    wakeLock=wl;
    wl.addEventListener('release',function(){if(tracking)reqWake();});
  }).catch(function(){document.getElementById('wake-banner').style.display='block';});
}
function relWake(){try{if(wakeLock)wakeLock.release();}catch(e){}wakeLock=null;document.getElementById('wake-banner').style.display='none';}

/* ===== VISIBILITY ===== */
document.addEventListener('visibilitychange',function(){
  if(!tracking)return;
  if(document.hidden){hiddenAt=Date.now();}
  else{
    try{if(audioCtx)audioCtx.resume();}catch(e){}
    if(hiddenAt){var g=Math.round((Date.now()-hiddenAt)/1000);if(g>3)toast('⚠️ 屏幕熄灭'+g+'秒，GPS已恢复，期间轨迹有断开',5000);hiddenAt=null;}
    reqWake();
  }
});

/* ===== MARKERS ===== */
function mkIco(color,sz){sz=sz||13;return L.divIcon({html:'<div style="width:'+sz+'px;height:'+sz+'px;border-radius:50%;background:'+color+';border:2px solid #fff;box-shadow:0 0 6px '+color+'88;"></div>',iconSize:[sz,sz],iconAnchor:[sz/2,sz/2],className:''});}
function mkPulse(){return L.divIcon({html:'<div style="width:14px;height:14px;border-radius:50%;background:#00e5a0;border:2px solid #fff;animation:gp 1.4s infinite;"></div><style>@keyframes gp{0%,100%{box-shadow:0 0 0 0 #00e5a055}50%{box-shadow:0 0 0 9px transparent}}</style>',iconSize:[14,14],iconAnchor:[7,7],className:''});}

/* ===== GPS HANDLER ===== */
function onPos(pos){
  if(!tracking)return;
  var lat=pos.coords.latitude,lng=pos.coords.longitude,acc=pos.coords.accuracy,spd=pos.coords.speed,now=Date.now();
  document.getElementById('g-acc').textContent=acc?Math.round(acc):'?';
  document.getElementById('g-time').textContent=new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  hzBuf.push(now);hzBuf=hzBuf.filter(function(t){return now-t<5000;});
  document.getElementById('g-hz').textContent=(hzBuf.length/5).toFixed(1);
  var lim=points.length<3?100:50;if(acc&&acc>lim)return;
  if(now-lastPtTime<800)return;
  var pt={lat:lat,lng:lng,time:now,acc:acc||0};
  if(points.length===0){
    map.setView([lat,lng],17);
    mStart=L.marker([lat,lng],{icon:mkIco('#00b8ff',13),zIndexOffset:10}).addTo(map).bindPopup('起点').openPopup();
  }else{
    var prev=points[points.length-1],d=hav(prev,pt);
    if(d<0.001&&acc>=(prev.acc||999))return;
    totalDist+=d;
    var kmh=(spd!==null&&spd!==undefined&&spd>=0)?spd*3.6:(d/((now-prev.time)/3600000));
    document.getElementById('s-spd').textContent=Math.min(kmh,200).toFixed(1);
  }
  points.push(pt);lastPtTime=now;
  polyline.addLatLng([lat,lng]);
  if(mCur)map.removeLayer(mCur);
  mCur=L.marker([lat,lng],{icon:mkPulse(),zIndexOffset:20}).addTo(map);
  if(!map.getBounds().contains([lat,lng]))map.panTo([lat,lng]);
  document.getElementById('s-dist').textContent=totalDist.toFixed(2);
  document.getElementById('s-pts').textContent=points.length;
}
function onErr(err){var m={1:'定位权限被拒绝',2:'无法获取位置信号',3:'定位超时'};toast('⚠️ '+(m[err.code]||'定位错误'),4000);}

/* ===== COMMANDS ===== */
function cmdStart(){
  if(!navigator.geolocation){toast('⚠️ 浏览器不支持定位');return;}
  tone([440,660,880],0.11,'triangle',0.18);flash('btn-start','▶ 记录中');
  tracking=true;points=[];totalDist=0;lastPtTime=0;hzBuf=[];
  if(polyline){map.removeLayer(polyline);polyline=null;}
  if(mStart){map.removeLayer(mStart);mStart=null;}
  if(mEnd){map.removeLayer(mEnd);mEnd=null;}
  if(mCur){map.removeLayer(mCur);mCur=null;}
  polyline=L.polyline([],{color:'#00e5a0',weight:4,opacity:0.92,lineJoin:'round',lineCap:'round'}).addTo(map);
  startTime=Date.now();
  timerIv=setInterval(function(){if(startTime)document.getElementById('s-time').textContent=fmtT(Date.now()-startTime);},500);
  document.getElementById('status-dot').className='on';
  document.getElementById('s-dist').textContent='0.00';
  document.getElementById('s-pts').textContent='0';
  document.getElementById('s-spd').textContent='0.0';
  setMode('记录中');setBtns('run');
  watchId=navigator.geolocation.watchPosition(onPos,onErr,{enableHighAccuracy:true,timeout:10000,maximumAge:0});
  backupTimer=setInterval(function(){navigator.geolocation.getCurrentPosition(onPos,function(){},{enableHighAccuracy:true,timeout:8000,maximumAge:1500});},2000);
  reqWake();startSilent();
  toast('📍 高精度记录已开始');
}

function cmdStop(){
  tone([880,550,330],0.11,'triangle',0.18);flash('btn-stop','■ 已停止');
  if(watchId!==null){navigator.geolocation.clearWatch(watchId);watchId=null;}
  clearInterval(backupTimer);backupTimer=null;
  clearInterval(timerIv);timerIv=null;
  stopSilent();relWake();
  tracking=false;
  document.getElementById('status-dot').className='off';setMode('已停止');setBtns('done');
  if(points.length>=2){
    var last=points[points.length-1];
    mEnd=L.marker([last.lat,last.lng],{icon:mkIco('#ff4757',13)}).addTo(map).bindPopup('终点').openPopup();
    map.fitBounds(polyline.getBounds(),{padding:[40,40]});
    var el=last.time-points[0].time,avg=el>0?totalDist/(el/3600000):0;
    toast('✅ '+totalDist.toFixed(2)+' km · '+fmtTL(el)+' · 均速'+avg.toFixed(1)+'km/h',6000);
  }else{toast('⚠️ 点位太少，请检查定位权限');}
}

function cmdSave(){
  if(points.length<2){toast('点位不足');return;}
  tone([523,659,784,1047],0.09,'sine',0.15);flash('btn-save','✓ 已保存');
  var el=points[points.length-1].time-points[0].time;
  var rec={id:Date.now().toString(),date:new Date().toLocaleString('zh-CN'),distance:totalDist,duration:el,points:points.slice()};
  var arr=loadRoutes();arr.unshift(rec);localStorage.setItem('routes',JSON.stringify(arr));
  toast('✅ 路线已保存！');document.getElementById('btn-save').disabled=true;
}

function cmdReset(){
  tone([280],0.18,'square',0.10);
  if(watchId!==null){navigator.geolocation.clearWatch(watchId);watchId=null;}
  clearInterval(backupTimer);backupTimer=null;
  clearInterval(timerIv);timerIv=null;
  stopSilent();relWake();
  tracking=false;points=[];totalDist=0;lastPtTime=0;
  [polyline,mStart,mEnd,mCur].forEach(function(l){if(l)map.removeLayer(l);});
  polyline=mStart=mEnd=mCur=null;
  document.getElementById('status-dot').className='';setMode('就绪');
  ['s-dist','s-time','s-spd','s-pts'].forEach(function(id){document.getElementById(id).textContent=id==='s-dist'?'0.00':id==='s-time'?'00:00':id==='s-spd'?'0.0':'0';});
  ['g-acc','g-time','g-hz'].forEach(function(id){document.getElementById(id).textContent='—';});
  setBtns('idle');
}

/* ===== HISTORY ===== */
function loadRoutes(){try{return JSON.parse(localStorage.getItem('routes')||'[]');}catch(e){return[];}}
var hPoly=null,hMark=[];
function clearHL(){if(hPoly){map.removeLayer(hPoly);hPoly=null;}hMark.forEach(function(m){map.removeLayer(m);});hMark=[];}

function openHistory(){
  document.getElementById('history-panel').classList.add('open');
  var list=document.getElementById('hist-list'),routes=loadRoutes();
  if(!routes.length){list.innerHTML='<div style="color:var(--muted);text-align:center;padding:40px;font-size:14px;">暂无保存的路线</div>';return;}
  list.innerHTML='';
  routes.forEach(function(r,i){
    var el=r.duration||0,avg=el>0?(r.distance/(el/3600000)).toFixed(1):'—';
    var div=document.createElement('div');div.className='hitem';
    div.innerHTML='<div class="hitem-top"><span class="hitem-name">路线'+(routes.length-i)+'</span><div style="display:flex;align-items:center;gap:8px;"><span class="hitem-date">'+r.date+'</span><button class="hdel" onclick="delRoute(\''+r.id+'\',event)">删除</button></div></div><div class="hitem-stats"><div class="hs">📏 '+r.distance.toFixed(2)+' <span>km</span></div><div class="hs">⏱ '+fmtTL(el)+'</div><div class="hs">🔵 '+r.points.length+' <span>点</span></div><div class="hs">⚡ '+avg+' <span>km/h</span></div></div>';
    div.addEventListener('click',function(e){if(e.target.classList.contains('hdel'))return;viewRoute(r);});
    list.appendChild(div);
  });
}
function closeHistory(){document.getElementById('history-panel').classList.remove('open');}
function viewRoute(r){
  closeHistory();clearHL();if(r.points.length<2)return;
  var lls=r.points.map(function(p){return[p.lat,p.lng];});
  hPoly=L.polyline(lls,{color:'#00b8ff',weight:4,opacity:.9}).addTo(map);
  hMark=[L.marker(lls[0],{icon:mkIco('#00b8ff',13)}).addTo(map).bindPopup('起点').openPopup(),L.marker(lls[lls.length-1],{icon:mkIco('#ff4757',13)}).addTo(map).bindPopup('终点')];
  map.fitBounds(hPoly.getBounds(),{padding:[50,50]});
  toast('📍 '+r.distance.toFixed(2)+' km · '+fmtTL(r.duration));
}
function delRoute(id,e){
  e.stopPropagation();if(!confirm('确定删除？'))return;
  localStorage.setItem('routes',JSON.stringify(loadRoutes().filter(function(r){return r.id!==id;})));
  openHistory();
}

/* ===== INIT ===== */
setBtns('idle');
navigator.geolocation&&navigator.geolocation.getCurrentPosition(function(p){map.setView([p.coords.latitude,p.coords.longitude],16);},function(){});
</script>
</body>
</html>
