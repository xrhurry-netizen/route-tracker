<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>路线记录仪</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+SC:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0d0f14; --surface:#161923; --surface2:#1e2333; --border:#2a3045;
    --accent:#00e5a0; --accent2:#00b8ff; --danger:#ff4757; --warning:#ffa502;
    --text:#e8ecf5; --muted:#6b7594;
    --mono:'Space Mono',monospace; --sans:'Noto Sans SC',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--sans);}
  #app{display:flex;flex-direction:column;height:100vh;}

#header{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:var(–surface);border-bottom:1px solid var(–border);z-index:1000;}
#header h1{font-family:var(–mono);font-size:15px;letter-spacing:2px;color:var(–accent);text-transform:uppercase;}
#status-dot{width:10px;height:10px;border-radius:50%;background:var(–muted);transition:background .3s;}
#status-dot.tracking{background:var(–accent);animation:pulse 1.2s infinite;}
#status-dot.paused{background:var(–warning);}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(0,229,160,.6);}50%{box-shadow:0 0 0 6px rgba(0,229,160,0);}}

#map{flex:1;min-height:0;z-index:1;}

#stats-bar{flex-shrink:0;display:flex;justify-content:space-around;background:var(–surface);border-top:1px solid var(–border);border-bottom:1px solid var(–border);padding:10px 0;}
.stat{display:flex;flex-direction:column;align-items:center;flex:1;}
.stat+.stat{border-left:1px solid var(–border);}
.stat-label{font-size:10px;color:var(–muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:2px;}
.stat-value{font-family:var(–mono);font-size:20px;color:var(–text);font-weight:700;}
.stat-unit{font-size:9px;color:var(–muted);margin-top:1px;}

#controls{flex-shrink:0;display:flex;gap:10px;padding:12px 16px;background:var(–surface);}
.btn{flex:1;padding:12px 8px;border:none;border-radius:8px;font-family:var(–mono);font-size:12px;letter-spacing:1px;font-weight:700;cursor:pointer;text-transform:uppercase;transition:all .15s;outline:none;}
.btn:active{transform:scale(.96);}
.btn-primary{background:var(–accent);color:#000;}
.btn-danger{background:transparent;border:1px solid var(–danger);color:var(–danger);}
.btn-secondary{background:transparent;border:1px solid var(–border);color:var(–muted);}
.btn-save{background:var(–accent2);color:#000;}
.btn:disabled{opacity:.35;cursor:not-allowed;transform:none;}

/* Wake lock banner */
#wake-banner{display:none;background:#1a1200;border-bottom:1px solid var(–warning);color:var(–warning);font-size:11px;padding:5px 14px;text-align:center;font-family:var(–mono);}
#wake-banner.show{display:block;}

/* GPS quality bar */
#gps-bar{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:4px 14px;background:var(–surface2);border-bottom:1px solid var(–border);font-size:10px;color:var(–muted);font-family:var(–mono);}
#gps-acc{color:var(–text);}
#gps-last{color:var(–text);}

/* History panel */
#history-panel{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:var(–bg);z-index:2000;overflow-y:auto;flex-direction:column;}
#history-panel.open{display:flex;}
#history-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:var(–surface);border-bottom:1px solid var(–border);position:sticky;top:0;}
#history-header h2{font-family:var(–mono);font-size:14px;color:var(–accent);letter-spacing:2px;}
#close-history{background:none;border:none;color:var(–muted);font-size:22px;cursor:pointer;font-family:var(–mono);}
#history-list{flex:1;padding:12px;display:flex;flex-direction:column;gap:10px;}
.history-item{background:var(–surface);border:1px solid var(–border);border-radius:10px;padding:14px;cursor:pointer;transition:border-color .2s;}
.history-item:hover{border-color:var(–accent);}
.history-item-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.history-item-name{font-family:var(–mono);font-size:13px;color:var(–accent);}
.history-item-date{font-size:11px;color:var(–muted);}
.history-item-stats{display:flex;gap:14px;flex-wrap:wrap;}
.history-stat{font-size:12px;color:var(–text);}
.history-stat span{color:var(–muted);font-size:11px;}
.history-item-del{background:none;border:1px solid transparent;color:var(–danger);font-size:13px;cursor:pointer;font-family:var(–mono);padding:2px 6px;border-radius:4px;}
.history-item-del:hover{border-color:var(–danger);}

#toast{position:fixed;bottom:120px;left:50%;transform:translateX(-50%) translateY(20px);background:var(–surface2);border:1px solid var(–border);color:var(–text);padding:10px 20px;border-radius:20px;font-size:13px;opacity:0;pointer-events:none;transition:all .3s;z-index:3000;white-space:nowrap;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

.leaflet-tile-pane{filter:brightness(.75) saturate(.7) hue-rotate(10deg);}
.leaflet-control-attribution{display:none!important;}
.leaflet-control-zoom a{background:var(–surface)!important;color:var(–text)!important;border-color:var(–border)!important;}
</style>

</head>
<body>
<div id="app">
  <div id="header">
    <h1>路线记录仪</h1>
    <div style="display:flex;align-items:center;gap:10px;">
      <span id="mode-label" style="font-size:11px;color:var(--muted);font-family:var(--mono);">就绪</span>
      <div id="status-dot"></div>
      <button class="btn btn-secondary" style="flex:none;padding:6px 12px;font-size:11px;" onclick="openHistory()">历史</button>
    </div>
  </div>

  <div id="wake-banner">⚠️ 屏幕常亮未能锁定，请勿锁屏，否则 GPS 会中断</div>
  <div id="gps-bar">
    <span>精度: <span id="gps-acc">—</span> m</span>
    <span>上次更新: <span id="gps-last">—</span></span>
    <span>采样: <span id="gps-hz">—</span> Hz</span>
  </div>

  <div id="map"></div>

  <div id="stats-bar">
    <div class="stat"><div class="stat-label">距离</div><div class="stat-value" id="stat-dist">0.00</div><div class="stat-unit">KM</div></div>
    <div class="stat"><div class="stat-label">时间</div><div class="stat-value" id="stat-time">00:00</div><div class="stat-unit">MM:SS</div></div>
    <div class="stat"><div class="stat-label">速度</div><div class="stat-value" id="stat-speed">0.0</div><div class="stat-unit">KM/H</div></div>
    <div class="stat"><div class="stat-label">点位</div><div class="stat-value" id="stat-pts">0</div><div class="stat-unit">PTS</div></div>
  </div>

  <div id="controls">
    <button class="btn btn-primary"   id="btn-start" onclick="startTracking()">开始</button>
    <button class="btn btn-danger"    id="btn-stop"  onclick="stopTracking()"  disabled>停止</button>
    <button class="btn btn-save"      id="btn-save"  onclick="saveRoute()"     disabled>保存</button>
    <button class="btn btn-secondary" id="btn-reset" onclick="resetRoute()"    disabled>清除</button>
  </div>
</div>

<div id="history-panel">
  <div id="history-header">
    <h2>历史路线</h2>
    <button id="close-history" onclick="closeHistory()">✕</button>
  </div>
  <div id="history-list"></div>
</div>
<div id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

<script>
// ── MAP ──────────────────────────────────────────────────────────────────────
const map = L.map('map', {zoomControl:true, attributionControl:false});
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
map.setView([49.8951, -97.1384], 13);

// ── STATE ────────────────────────────────────────────────────────────────────
let tracking      = false;
let watchId       = null;
let backupTimer   = null;
let wakeLock      = null;
let points        = [];   // {lat, lng, time, acc}
let polyline      = null;
let startMarker   = null;
let endMarker     = null;
let currentMarker = null;
let startTime     = null;
let timerInterval = null;
let totalDistance = 0;
let lastPointTime = 0;       // timestamp of last accepted point
let lastAccuracy  = null;
let recentHz      = [];      // for Hz calculation

// ── UTILS ────────────────────────────────────────────────────────────────────
function haversine(a, b) {
  const R=6371, dLat=(b.lat-a.lat)*Math.PI/180, dLon=(b.lng-a.lng)*Math.PI/180,
        la=a.lat*Math.PI/180, lb=b.lat*Math.PI/180,
        x=Math.sin(dLat/2)**2+Math.cos(la)*Math.cos(lb)*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}
function formatTime(ms) {
  const s=Math.floor(ms/1000),m=Math.floor(s/60),h=Math.floor(m/60);
  return h>0?`${h}:${String(m%60).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`
            :`${String(m).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
}
function formatTimeFull(ms) {
  const s=Math.floor(ms/1000),m=Math.floor(s/60),h=Math.floor(m/60),p=[];
  if(h) p.push(`${h}小时`); if(m%60) p.push(`${m%60}分`); p.push(`${s%60}秒`);
  return p.join('');
}
function showToast(msg, d=2800) {
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),d);
}
function updateButtons(state) {
  document.getElementById('btn-start').disabled = state!=='idle';
  document.getElementById('btn-stop').disabled  = state!=='tracking';
  document.getElementById('btn-save').disabled  = state!=='stopped'||points.length<2;
  document.getElementById('btn-reset').disabled = state==='idle';
}
function setMode(l){document.getElementById('mode-label').textContent=l;}

// ── MARKERS ──────────────────────────────────────────────────────────────────
function makeIcon(color, size=14) {
  return L.divIcon({
    html:`<div style="width:${size}px;height:${size}px;border-radius:50%;background:${color};border:2px solid #fff;box-shadow:0 0 6px ${color}88;"></div>`,
    iconSize:[size,size], iconAnchor:[size/2,size/2], className:''
  });
}
function makePulse() {
  return L.divIcon({
    html:`<div style="width:14px;height:14px;border-radius:50%;background:#00e5a0;border:2px solid #fff;box-shadow:0 0 10px #00e5a066;animation:gp 1.4s infinite;"></div>
    <style>@keyframes gp{0%,100%{box-shadow:0 0 0 0 #00e5a055}50%{box-shadow:0 0 0 9px transparent}}</style>`,

```
iconSize:[14,14], iconAnchor:[7,7], className:''
```

});
}

// ── WAKE LOCK ────────────────────────────────────────────────────────────────
async function requestWakeLock() {
if (!(‘wakeLock’ in navigator)) {
document.getElementById(‘wake-banner’).classList.add(‘show’);
return;
}
try {
wakeLock = await navigator.wakeLock.request(‘screen’);
wakeLock.addEventListener(‘release’, () => {
// Re-request if still tracking (iOS may release on tab switch)
if (tracking) requestWakeLock();
});
} catch(e) {
document.getElementById(‘wake-banner’).classList.add(‘show’);
}
}
function releaseWakeLock() {
if (wakeLock) { wakeLock.release(); wakeLock=null; }
document.getElementById(‘wake-banner’).classList.remove(‘show’);
}

// ── GPS PROCESSING ───────────────────────────────────────────────────────────
function onPosition(pos) {
if (!tracking) return;
const {latitude:lat, longitude:lng, accuracy, speed} = pos.coords;
const now = Date.now();

// Update GPS info bar
lastAccuracy = accuracy;
document.getElementById(‘gps-acc’).textContent  = accuracy ? Math.round(accuracy) : ‘?’;
document.getElementById(‘gps-last’).textContent = new Date().toLocaleTimeString(‘zh-CN’,{hour:‘2-digit’,minute:‘2-digit’,second:‘2-digit’});

// Hz calculation
recentHz.push(now);
recentHz = recentHz.filter(t => now-t < 5000);
document.getElementById(‘gps-hz’).textContent = (recentHz.length/5).toFixed(1);

// Reject poor accuracy (>50m) only if we have better recent data
// For first points, accept anything up to 100m
const accLimit = points.length < 3 ? 100 : 50;
if (accuracy && accuracy > accLimit) return;

// Minimum 1 second between points (de-duplicate rapid identical callbacks)
if (now - lastPointTime < 800) return;

const pt = {lat, lng, time:now, acc:accuracy||0};

if (points.length === 0) {
map.setView([lat, lng], 17);
startMarker = L.marker([lat,lng], {icon:makeIcon(’#00b8ff’,13), zIndexOffset:10})
.addTo(map).bindPopup(‘起点’).openPopup();
} else {
const prev = points[points.length-1];
const d = haversine(prev, pt);

```
// Only skip if BOTH distance < 1m AND accuracy hasn't improved
// This preserves slow walking and pauses at crossings
if (d < 0.001 && accuracy >= (prev.acc || 999)) return;

totalDistance += d;

// Smooth speed from GPS speed field if available, else calculate
const spd = (speed != null && speed >= 0)
  ? speed * 3.6
  : (d / ((now - prev.time)/3600000));
document.getElementById('stat-speed').textContent = Math.min(spd, 150).toFixed(1);
```

}

points.push(pt);
lastPointTime = now;
polyline.addLatLng([lat, lng]);

if (currentMarker) map.removeLayer(currentMarker);
currentMarker = L.marker([lat,lng], {icon:makePulse(), zIndexOffset:20}).addTo(map);
if (!map.getBounds().contains([lat,lng])) map.panTo([lat,lng]);

document.getElementById(‘stat-dist’).textContent = totalDistance.toFixed(2);
document.getElementById(‘stat-pts’).textContent  = points.length;
}

function onError(err) {
const msgs = {1:‘定位权限被拒绝，请在设置中允许’, 2:‘无法获取位置信号’, 3:‘定位超时’};
showToast(’⚠️ ’+(msgs[err.code]||‘定位错误’), 4000);
}

// ── TRACKING ─────────────────────────────────────────────────────────────────
function startTracking() {
if (!navigator.geolocation) { showToast(‘⚠️ 浏览器不支持定位’); return; }

tracking=true; points=[]; totalDistance=0; lastPointTime=0; recentHz=[];

// Clear map layers
[polyline,startMarker,endMarker,currentMarker].forEach(l=>{if(l)map.removeLayer(l);});
polyline = L.polyline([], {color:’#00e5a0’, weight:4, opacity:0.92, lineJoin:‘round’, lineCap:‘round’}).addTo(map);
startMarker=endMarker=currentMarker=null;

startTime = Date.now();
timerInterval = setInterval(()=>{
if(startTime) document.getElementById(‘stat-time’).textContent=formatTime(Date.now()-startTime);
}, 500);

document.getElementById(‘status-dot’).className = ‘tracking’;
document.getElementById(‘stat-dist’).textContent = ‘0.00’;
document.getElementById(‘stat-pts’).textContent  = ‘0’;
document.getElementById(‘stat-speed’).textContent= ‘0.0’;
setMode(‘记录中’);
updateButtons(‘tracking’);

// Primary: watchPosition with high accuracy
const opts = {enableHighAccuracy:true, timeout:10000, maximumAge:0};
watchId = navigator.geolocation.watchPosition(onPosition, onError, opts);

// Backup: poll getCurrentPosition every 2 seconds
// This is critical on iOS where watchPosition may slow down
backupTimer = setInterval(()=>{
navigator.geolocation.getCurrentPosition(onPosition, ()=>{}, {
enableHighAccuracy:true, timeout:8000, maximumAge:1000
});
}, 2000);

// Screen wake lock
requestWakeLock();

showToast(‘📍 开始记录（高精度模式）’);
}

function stopTracking() {
if (watchId!==null) { navigator.geolocation.clearWatch(watchId); watchId=null; }
clearInterval(backupTimer); backupTimer=null;
clearInterval(timerInterval); timerInterval=null;
releaseWakeLock();
tracking=false;

document.getElementById(‘status-dot’).className=‘paused’;
setMode(‘已停止’);
updateButtons(‘stopped’);

if (points.length >= 2) {
const last=points[points.length-1];
endMarker = L.marker([last.lat,last.lng], {icon:makeIcon(’#ff4757’,13)})
.addTo(map).bindPopup(‘终点’).openPopup();
map.fitBounds(polyline.getBounds(), {padding:[40,40]});
const elapsed = points[points.length-1].time - points[0].time;
const avgSpd  = totalDistance / (elapsed/3600000);
showToast(`✅ ${totalDistance.toFixed(2)} km · ${formatTimeFull(elapsed)} · 均速 ${avgSpd.toFixed(1)} km/h`, 5000);
} else {
showToast(‘⚠️ 点位太少，请检查定位权限’);
}
}

function resetRoute() {
if (watchId!==null) { navigator.geolocation.clearWatch(watchId); watchId=null; }
clearInterval(backupTimer); backupTimer=null;
clearInterval(timerInterval); timerInterval=null;
releaseWakeLock();
tracking=false; points=[]; totalDistance=0; lastPointTime=0; recentHz=[];

[polyline,startMarker,endMarker,currentMarker].forEach(l=>{if(l)map.removeLayer(l);});
polyline=startMarker=endMarker=currentMarker=null;

document.getElementById(‘status-dot’).className=’’;
document.getElementById(‘stat-dist’).textContent=‘0.00’;
document.getElementById(‘stat-time’).textContent=‘00:00’;
document.getElementById(‘stat-speed’).textContent=‘0.0’;
document.getElementById(‘stat-pts’).textContent=‘0’;
document.getElementById(‘gps-acc’).textContent=’—’;
document.getElementById(‘gps-last’).textContent=’—’;
document.getElementById(‘gps-hz’).textContent=’—’;
setMode(‘就绪’);
updateButtons(‘idle’);
}

// ── SAVE / LOAD ───────────────────────────────────────────────────────────────
function saveRoute() {
if (points.length<2) { showToast(‘点位不足，无法保存’); return; }
const elapsed = points[points.length-1].time - points[0].time;
const record  = {
id: Date.now().toString(),
date: new Date().toLocaleString(‘zh-CN’),
distance: totalDistance,
duration: elapsed,
points: points.slice()
};
const arr = loadRoutes(); arr.unshift(record);
localStorage.setItem(‘routes’, JSON.stringify(arr));
showToast(‘✅ 路线已保存！’);
document.getElementById(‘btn-save’).disabled = true;
}
function loadRoutes() {
try { return JSON.parse(localStorage.getItem(‘routes’)||’[]’); } catch { return []; }
}

// ── HISTORY ───────────────────────────────────────────────────────────────────
let hPolyline=null, hMarkers=[];
function clearHistoryLayers(){
if(hPolyline){map.removeLayer(hPolyline);hPolyline=null;}
hMarkers.forEach(m=>map.removeLayer(m)); hMarkers=[];
}
function openHistory(){
document.getElementById(‘history-panel’).classList.add(‘open’);
const list=document.getElementById(‘history-list’);
const routes=loadRoutes();
if(!routes.length){
list.innerHTML=’<div style="color:var(--muted);text-align:center;padding:40px;font-size:14px;">暂无保存的路线</div>’;
return;
}
list.innerHTML=’’;
routes.forEach((r,i)=>{
const elapsed=r.duration||0;
const avgSpd = elapsed>0 ? (r.distance/(elapsed/3600000)).toFixed(1) : ‘—’;
const div=document.createElement(‘div’); div.className=‘history-item’;
div.innerHTML=` <div class="history-item-header"> <span class="history-item-name">路线 ${routes.length-i}</span> <div style="display:flex;align-items:center;gap:8px;"> <span class="history-item-date">${r.date}</span> <button class="history-item-del" onclick="deleteRoute('${r.id}',event)">删除</button> </div> </div> <div class="history-item-stats"> <div class="history-stat">📏 ${r.distance.toFixed(2)} <span>km</span></div> <div class="history-stat">⏱ ${formatTimeFull(elapsed)}</div> <div class="history-stat">🔵 ${r.points.length} <span>点</span></div> <div class="history-stat">⚡ ${avgSpd} <span>km/h</span></div> </div>`;
div.querySelector(’.history-item-header’).addEventListener(‘click’,e=>{
if(e.target.classList.contains(‘history-item-del’)) return;
viewRoute(r);
});
list.appendChild(div);
});
}
function closeHistory(){document.getElementById(‘history-panel’).classList.remove(‘open’);}
function viewRoute(r){
closeHistory(); clearHistoryLayers();
if(r.points.length<2) return;
const lls=r.points.map(p=>[p.lat,p.lng]);
hPolyline=L.polyline(lls,{color:’#00b8ff’,weight:4,opacity:.9}).addTo(map);
hMarkers=[
L.marker(lls[0],{icon:makeIcon(’#00b8ff’,13)}).addTo(map).bindPopup(‘起点’).openPopup(),
L.marker(lls[lls.length-1],{icon:makeIcon(’#ff4757’,13)}).addTo(map).bindPopup(‘终点’)
];
map.fitBounds(hPolyline.getBounds(),{padding:[50,50]});
showToast(`📍 ${r.distance.toFixed(2)} km · ${formatTimeFull(r.duration)}`);
}
function deleteRoute(id,e){
e.stopPropagation();
if(!confirm(‘确定删除这条路线？’)) return;
localStorage.setItem(‘routes’, JSON.stringify(loadRoutes().filter(r=>r.id!==id)));
openHistory();
}

// ── AUDIO ENGINE ─────────────────────────────────────────────────────────────
let audioCtx = null;
function getAudio() {
if (!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
if (audioCtx.state===‘suspended’) audioCtx.resume();
return audioCtx;
}
function playTone(freqs, dur=0.15, type=‘triangle’, vol=0.18) {
try {
const ctx=getAudio();
freqs.forEach((f,i)=>{
const o=ctx.createOscillator(), g=ctx.createGain();
o.connect(g); g.connect(ctx.destination);
o.type=type;
const t=ctx.currentTime+i*dur*0.55;
o.frequency.setValueAtTime(f,t);
g.gain.setValueAtTime(vol,t);
g.gain.exponentialRampToValueAtTime(0.001,t+dur);
o.start(t); o.stop(t+dur+0.05);
});
} catch(e){}
}
const SFX = {
start: ()=>playTone([440,660,880],0.11,‘triangle’,0.18),
stop:  ()=>playTone([880,550,330],0.11,‘triangle’,0.18),
save:  ()=>playTone([523,659,784,1047],0.09,‘sine’,0.15),
reset: ()=>playTone([280],0.18,‘square’,0.1),
};

// Silent looping audio — tries to keep iOS Safari alive in background
let silentSrc=null;
function startSilentAudio(){
try{
const ctx=getAudio();
const buf=ctx.createBuffer(1,ctx.sampleRate*3,ctx.sampleRate);
const d=buf.getChannelData(0);
for(let i=0;i<d.length;i++) d[i]=Math.sin(2*Math.PI*18*i/ctx.sampleRate)*0.002;
function loop(){
silentSrc=ctx.createBufferSource();
silentSrc.buffer=buf;
silentSrc.connect(ctx.destination);
silentSrc.onended=()=>{if(tracking)loop();};
silentSrc.start();
}
loop();
}catch(e){}
}
function stopSilentAudio(){
try{if(silentSrc)silentSrc.stop();}catch(e){}
silentSrc=null;
}

// ── BUTTON VISUAL FEEDBACK ────────────────────────────────────────────────────
function flashBtn(id, flashColor, flashLabel) {
const btn=document.getElementById(id);
const origBg=btn.style.background, origTxt=btn.textContent;
btn.style.background=flashColor;
btn.style.transform=‘scale(0.91)’;
btn.style.transition=‘all 0.08s’;
if(flashLabel) btn.textContent=flashLabel;
setTimeout(()=>{
btn.style.background=origBg;
btn.style.transform=’’;
if(flashLabel) btn.textContent=origTxt;
}, 350);
}

// ── PAGE VISIBILITY — recover when screen comes back ─────────────────────────
let hiddenAt=null;
document.addEventListener(‘visibilitychange’,()=>{
if(!tracking) return;
if(document.hidden){
hiddenAt=Date.now();
} else {
if(audioCtx) audioCtx.resume();
if(hiddenAt){
const gap=Math.round((Date.now()-hiddenAt)/1000);
if(gap>3) showToast(`⚠️ 屏幕熄灭 ${gap} 秒，GPS 已恢复，期间轨迹中断`,4500);
hiddenAt=null;
}
requestWakeLock();
}
});

// ── WRAP BUTTONS WITH SFX + FLASH ────────────────────────────────────────────
const _origStart=startTracking, _origStop=stopTracking,
_origSave=saveRoute,      _origReset=resetRoute;

startTracking=function(){
SFX.start(); flashBtn(‘btn-start’,’#007a55’,‘▶ 记录中’);
_origStart(); startSilentAudio();
};
stopTracking=function(){
SFX.stop(); flashBtn(‘btn-stop’,’#8b0000’,‘■ 停止’);
stopSilentAudio(); _origStop();
};
saveRoute=function(){
SFX.save(); flashBtn(‘btn-save’,’#005f99’,‘✓ 已保存’);
_origSave();
};
resetRoute=function(){
SFX.reset(); stopSilentAudio(); _origReset();
};

// ── INIT ──────────────────────────────────────────────────────────────────────
updateButtons(‘idle’);
navigator.geolocation?.getCurrentPosition(
pos=>map.setView([pos.coords.latitude,pos.coords.longitude],16), ()=>{}
);
// Prime AudioContext on first user touch (iOS requirement)
document.addEventListener(‘touchstart’,()=>{try{getAudio();}catch(e){}},{once:true});
</script>
